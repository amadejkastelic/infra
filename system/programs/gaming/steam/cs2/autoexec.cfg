//exec de_subtick_01.cfg
//exec null.cfg

// movement
bind "w" "+forward"
bind "a" "+left"
bind "d" "+right"
bind "s" "+back"
bind "ctrl" "+duck"
bind "mwheelup" "+jump"
bind "mwheeldown" "+jump"

cl_forcepreload 1

// Rates
cl_updaterate 128
cl_interp_ratio 1
cl_interp 0.015625
rate "1000000"
cl_predictweapons "1"
cl_lagcompensation "1"
net_client_steamdatagram_enable_override "1"
net_maxroutable "1200"
mm_session_search_qos_timeout "20"
mm_dedicated_search_maxping "60"
cl_resend "0.5"
lobby_default_privacy_bits2 "0"

// Mouse
sensitivity "1.8"
zoom_sensitivity_ratio_mouse "1.0"
m_rawinput "1"
m_pitch "0.022"
m_customaccel "0"
m_mouseaccel1 "0"
m_mouseaccel2 "0"
m_mousespeed "0"

// Video
mat_monitorgamma "2.2"
mat_queue_mode "-1" // auto detect multi-core rendering
fps_max "500"
fps_max_menu "500"
r_dynamic "0"
r_drawtracers_firstperson "0"
engine_no_focus_sleep "0" // default 50

// Quicksens
sensitivity 1.8
alias +sens sensitivity 5
alias -sens sensitivity 1.8
//bind "mouse5" "+sens"
//bind "mouse4" "+sens"

// Audio
volume "0.3"
voice_enable "1"
voice_scale "1" // receive volume
voice_mixer_volume "1" // mic volume
windows_speaker_config "1" // headphone audio output
snd_menumusic_volume "0"
snd_roundstart_volume "0"
snd_roundend_volume "0"
snd_mapobjective_volume "0"
snd_deathcamera_volume "0"
snd_tensecondwarning_volume "0.3"
snd_mvp_volume "0.3"
snd_mix_async "1"
snd_mixahead "0.02" // sound delay
snd_pitchquality "1"
snd_ducking_off "1"
snd_front_headphone_position "90"
snd_rear_headphone_position "90"
snd_headphone_pan_exponent "1.2"
snd_headphone_pan_radial_weight "1"
snd_mute_losefocus  "1" // mute game when alt-tabbed
dsp_enhance_stereo "0"
lobby_voice_chat_enabled "0" // voice chat in lobby
cl_mute_all_but_friends_and_party "0"
snd_async_flush

// HUD
hud_scaling "0.80"
hud_showtargetid "1"
cl_hud_background_alpha "0.100000"
cl_hud_bomb_under_radar "0"
cl_hud_color "1"
cl_hud_healthammo_style "1"
cl_hud_playercount_pos "0"
cl_hud_playercount_showcount "0"
cl_hud_radar_scale "0.950000"
cl_teamid_overhead_name_alpha "240"
cl_righthand "1"
cl_showloadout "1"
cl_showpos "0"
cl_showfps "0"
net_graph "0"
net_graphproportionalfont "0" // small netgraph font
// Radar
cl_radar_always_centered "0"
cl_radar_rotate "1"
cl_radar_scale "0.4"
cl_radar_icon_scale_min "0.4"
cl_radar_square_with_scoreboard "0"
// Reposition gun model to mimic source
viewmodel_presetpos "0"
viewmodel_fov "68"
viewmodel_offset_x "2.500000"
viewmodel_offset_y "0"
viewmodel_offset_z "-1.500000"
viewmodel_recoil "1"
viewmodel_fov "68"
viewmodel_offset_x "2"
viewmodel_offset_y "2"
viewmodel_offset_z "-2"
// Reduce gun shifting when crouching
cl_viewmodel_shift_left_amt "0.5"
cl_viewmodel_shift_right_amt "0.5"
// Reduce gun and scope shifting/bobbing when moving
cl_bobcycle "0.98"
cl_bob_lower_amt "5"
cl_bobamt_lat "0.1"
cl_bobamt_vert "0.1"

// Quickswitch
alias +knife slot3
alias -knife lastinv
bind t +knife

//useful
con_enable "1"
developer "0" // print console to screen
con_filter_enable "2"
con_filter_text "Damage "
ui_steam_overlay_notification_position "bottomright"
player_nevershow_communityservermessage "1"
mm_dedicated_force_servers ""
mm_csgo_community_search_players_min "8"
gameinstructor_enable "0"
option_duck_method "0"
option_speed_method "0"
cl_forcepreload "1"
cl_downloadfilter "nosound" // mapsonly pls volvo
cl_join_advertise "2" // let friends join your game
cl_disablehtmlmotd "0"
cl_autohelp "0"
cl_showhelp "0"
cl_disablefreezecam "1"
spec_replay_autostart "0"
cl_dm_buyrandomweapons "0"
cl_teammate_colors_show "1"
cl_autowepswitch "0" // auto weapon switch on pickup
cl_use_opens_buy_menu "0" // `e` opening buy menu
cl_scoreboard_mouse_enable_binding "showmouse" // press `t` to enable mouse on the scoreboard
closeonbuy "0"
hud_takesshots "0" // scoreboard screenshot at end of match
cl_clanid "" // rip afterlife
password ""
cl_autowepswitch 0
bind "=" "toggleconsole"
bind "CapsLock" +voicerecord
cl_scoreboard_mouse_enable_binding +attack2
cl_teamcounter_playercount_instead_of_avatars "1"

//crosshair
cl_crosshair_drawoutline "1"
cl_crosshairalpha "255"
cl_crosshaircolor "4"
cl_crosshairdot "0"
cl_crosshairgap "-1"
cl_crosshairgap_useweaponvalue "0"
cl_crosshairsize "1"
cl_crosshairstyle "4"
cl_crosshairthickness "0.5"
cl_crosshairusealpha "1"

// kz
bind "x" "slot1; kz_cp";
bind "y" "slot1; kz_cp";
bind "u" "slot2; kz_tp";

// remove build number
r_show_build_info "false"

//viewmodel
viewmodel_fov 60
viewmodel_offset_x -0.5
viewmodel_offset_y 1
viewmodel_offset_z -1.5
viewmodel_presetpos 0

//bind y "exec autoexec"
